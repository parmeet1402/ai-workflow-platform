# Railway config-as-code (repo root = Docker build context for apps/document-worker).
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/document-worker/Dockerfile"

[deploy]
# Must match routes in apps/document-worker/src/index.ts health server
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "node /app/apps/document-worker/dist/index.js"
